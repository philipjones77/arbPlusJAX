name: docs-pdf

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"
      - name: Install LuaLaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-luatex texlive-latex-extra texlive-fonts-recommended
      - name: Refresh generated docs indexes
        run: python tools/generate_docs_indexes.py
      - name: Build PDF docs
        run: python tools/build_docs.py --builder latexpdf
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: arbplusjax-docs-pdf
          path: outputs/docs_site/_build/latex/arbplusjax-docs.pdf
