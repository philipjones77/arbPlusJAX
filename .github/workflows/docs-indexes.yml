name: docs-indexes

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install report-refresh dependencies
        run: |
          python -m pip install -e .
          python -m pip install -r requirements-compare.txt
      - name: Refresh generated docs and reports
        run: python tools/check_generated_reports.py
      - name: Require checked-in generated artifacts to be current
        run: git diff --exit-code
