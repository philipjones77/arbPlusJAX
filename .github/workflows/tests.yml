name: tests

on:
  push:
  pull_request:

jobs:
  chassis:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e .
      - name: Run chassis tests
        run: python -m pytest tests -q -m "not parity"
      - name: Run benchmark smoke tests
        if: matrix.os == 'ubuntu-latest'
        env:
          ARBPLUSJAX_RUN_BENCHMARKS: "1"
        run: python -m pytest benchmarks -q -m benchmark
